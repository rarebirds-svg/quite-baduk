name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy app
      - run: pytest --cov=app --cov-fail-under=80 -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test -- --run

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Start backend + web (native, no docker)
        # inkbaduk prod는 launchd에서 직접 운영되어 docker는 미사용이라
        # e2e 부팅도 동일한 네이티브 흐름으로 통일. start-stack.sh가
        # uvicorn + next dev를 백그라운드로 띄우고 헬스 대기까지 처리한다.
        # KATAGO_MOCK=true는 backend가 200MB 모델 파일 다운로드를 건너뛰게
        # 해 빠르게 ready 상태에 도달하도록 한다. e2e는 라우팅·DB·인증
        # 흐름과 UI 통합만 확인하므로 진짜 KataGo 추론은 끌어들이지 않는다.
        env:
          KATAGO_MOCK: "true"
        run: bash e2e/scripts/start-stack.sh
      - name: Run Playwright
        working-directory: e2e
        run: npm ci && npx playwright install --with-deps && npx playwright test
      - name: Stop stack
        if: always()
        run: bash e2e/scripts/stop-stack.sh
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
