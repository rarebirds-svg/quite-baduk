name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy app
      - run: pytest --cov=app --cov-fail-under=80 -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test -- --run

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build and start services
        # GitHub-hosted runners ship Docker Compose v2, which is invoked as
        # `docker compose` (no hyphen). The legacy `docker-compose` binary
        # was removed from `ubuntu-latest` images, so the hyphenated form
        # exits 127.
        run: docker compose up --build -d
      - name: Wait for services
        run: |
          timeout 60 sh -c 'until curl -sf http://localhost:8000/api/health; do sleep 2; done'
          timeout 60 sh -c 'until curl -sf http://localhost:3000; do sleep 2; done'
      - name: Run Playwright
        working-directory: e2e
        run: npm ci && npx playwright install --with-deps && npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
