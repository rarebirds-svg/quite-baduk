# Cloudflare Tunnel routing for baduk.
#
# Replace __TUNNEL_UUID__, __USER_HOME__, and __DOMAIN__ during deploy.
# See deploy/README.md "Cloudflare Tunnel" section for full setup.
#
# Single-origin path-split: same hostname serves the Next.js app and the
# FastAPI backend. The browser sees one origin, so `web/lib/api.ts`'s
# relative `API_BASE` and same-origin WebSocket logic work without a
# rebuild, and the session cookie can stay SameSite=lax.

tunnel: __TUNNEL_UUID__
credentials-file: __USER_HOME__/.cloudflared/__TUNNEL_UUID__.json

ingress:
  # Backend (FastAPI) — REST under /api/* and WebSocket under /api/ws/*
  - hostname: __DOMAIN__
    path: ^/api(/.*)?$
    service: http://127.0.0.1:8000

  # Frontend (Next.js)
  - hostname: __DOMAIN__
    service: http://127.0.0.1:3000

  # Catch-all
  - service: http_status:404
