# 글로서리 시드 — slug·title·prompt_hint. LLM이 본문 작성, 사람이 새 항목 추가 시 여기에.
- slug: dan-gup
  title: 단·급
  prompt_hint: 입문~9급 → 1급 → 아마추어 1~7단(또는 9단). 단 차이가 1점 핸디캡에 해당. 한국 바둑 등급 체계.
- slug: gyega
  title: 계가·집
  prompt_hint: 한국 룰의 계가법(territory + 잡은 돌). 종국 절차. 일본 룰과 미세한 차이.
- slug: pae
  title: 패
  prompt_hint: 같은 자리에 즉시 되따냄 금지(동형반복). 패 진행 절차. 패감 개념.
- slug: chuk
  title: 축
  prompt_hint: 직선 추격. 축머리 개념. 축 성립 조건. 초보의 흔한 실수.
- slug: bik
  title: 빅
  prompt_hint: 양쪽 모두 살아 있어 둘 수 없는 상태. 한국 룰의 처리 — 점수 계산 시 빅 안의 집 인정 안 함.
- slug: samsam
  title: 삼삼
  prompt_hint: 3-3 점. 화점에 대한 침입수단. 알파고 이후 정석 변화.
- slug: komi
  title: 덤(komi)
  prompt_hint: 흑 선번 보정. 한국 룰 6.5집(접바둑 0.5집). 일본·중국 룰과 차이.
- slug: handicap
  title: 접바둑·치수
  prompt_hint: 2~9점 접바둑. 흑이 미리 두는 화점 위치. 단 차이만큼 접는 관습.
- slug: hwajeom
  title: 화점
  prompt_hint: 4-4점. 19로 반의 9개 화점 표시. 빠른 세력 확장의 거점.
- slug: kasaeng
  title: 사활
  prompt_hint: 돌의 삶과 죽음. 두 눈의 원칙. 사활 문제는 기력 향상의 핵심.
- slug: jeongseok
  title: 정석
  prompt_hint: 귀에서 흑백이 서로 최선을 주고받아 정형화된 수순. 외워 두면 초반 손해 방지. 상황·주변 배치에 맞게 선택.
- slug: poseok
  title: 포석
  prompt_hint: 초반에 판 전체의 큰 자리(귀→변→중앙)를 배치하는 전략 단계. 화점·소목 등. 세력과 실리의 균형.
- slug: dansu
  title: 단수
  prompt_hint: 돌의 활로가 하나만 남아 다음에 따낼 수 있는 상태. 바둑의 가장 기본 개념. 단수에 몰린 돌은 잇거나 달아나야 함.
- slug: gongbae
  title: 공배
  prompt_hint: 흑·백 어느 쪽 집도 아닌 중립 점. 한국 룰에서 종국 때 메워도 점수에 영향 없음. 수상전에서는 중요한 변수.
- slug: kkutnaegi
  title: 끝내기
  prompt_hint: 종반에 집의 경계를 확정하는 작은 수들. 선수·후수와 집 크기 계산. 역전이 자주 나는 단계.
- slug: susangjeon
  title: 수상전
  prompt_hint: 서로 잡으러 가는 돌끼리 활로를 메워 먼저 잡는 쪽이 이기는 싸움. 수 계산·공배·옥집·빅이 변수.
- slug: okjip
  title: 옥집
  prompt_hint: 눈처럼 보이지만 결함이 있어 결국 메워지는 가짜 눈. 사활에서 진짜 눈과 구별하는 것이 핵심.
- slug: seryeok-silli
  title: 세력·실리
  prompt_hint: 세력은 두터움·영향력, 실리는 확정된 집. 둘의 균형이 바둑 전략의 축. 삼삼 침입 등은 둘의 거래.
